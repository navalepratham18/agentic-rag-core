<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic RAG Engine</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            --gemini-bg: #131314;
            --gemini-surface: #1e1f20;
            --gemini-text: #e3e3e3;
            --gemini-muted: #c4c7c5;
            --gemini-border: #444746;
            --gemini-accent: #a8c7fa;
        }
        
        /* STRICT CSS GRID LAYOUT
           This divides the screen into 3 mathematically rigid rows. 
           Overlap is impossible.
        */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Google Sans', Inter, system-ui, -apple-system, sans-serif;
            background-color: var(--gemini-bg);
            color: var(--gemini-text);
            display: grid;
            grid-template-rows: auto 1fr auto; 
        }

        /* ROW 1: Header */
        .top-bar {
            grid-row: 1;
            padding: 18px 24px;
            font-size: 1.1rem;
            color: var(--gemini-muted);
            background-color: var(--gemini-bg);
            border-bottom: 1px solid rgba(255,255,255,0.05); /* Optional subtle separator */
        }

        /* ROW 2: Chat Scroll Area */
        .chat-wrapper {
            grid-row: 2;
            overflow-y: auto; /* Scroll is strictly locked inside this row */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .chat-history {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            padding-bottom: 25px; /* Exactly 5px gap before the textfield area starts */
        }

        /* ROW 3: Input Area */
        .input-wrapper {
            grid-row: 3;
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: var(--gemini-bg);
            padding: 15px 20px 30px 20px; /* 30px bottom lifts it off Windows taskbar */
            box-sizing: border-box;
        }

        /* --- Component Styling --- */
        
        .message {
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            font-size: 1rem;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--gemini-surface);
            padding: 12px 20px;
            border-radius: 24px;
            max-width: 85%;
            white-space: pre-wrap;
        }

        .message.bot {
            align-self: flex-start;
            background-color: transparent;
            width: 100%;
        }

        /* Markdown Styles */
        .message.bot p { margin-top: 0; margin-bottom: 16px; }
        .message.bot p:last-child { margin-bottom: 0; }
        
        .message.bot pre {
            background-color: var(--gemini-surface) !important;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid var(--gemini-border);
        }
        
        .message.bot code {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--gemini-surface);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        .message.bot pre code {
            background-color: transparent;
            padding: 0;
        }

        .message.bot h1, .message.bot h2, .message.bot h3 {
            color: var(--gemini-accent);
            margin-top: 24px;
            margin-bottom: 12px;
            font-weight: 500;
        }
        .message.bot h1 { font-size: 1.5rem; }
        .message.bot h2 { font-size: 1.3rem; }
        .message.bot h3 { font-size: 1.1rem; }
        .message.bot ul, .message.bot ol { padding-left: 24px; margin-top: 8px; margin-bottom: 16px; }
        .message.bot li { margin-bottom: 8px; }

        .meta-tag {
            font-size: 0.75rem;
            color: #8e918f;
            margin-top: 12px;
            font-family: monospace;
            display: inline-block;
        }

        /* Input Box Styling */
        .input-box {
            width: 100%;
            max-width: 820px;
            background-color: var(--gemini-surface);
            border-radius: 32px;
            display: flex;
            align-items: center;
            padding: 8px 8px 8px 24px;
            box-sizing: border-box;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--gemini-text);
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        input[type="text"]::placeholder {
            color: var(--gemini-muted);
        }

        button {
            background-color: var(--gemini-text);
            color: var(--gemini-bg);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-left: 12px;
        }

        button:hover { opacity: 0.8; }
        button:disabled { background-color: var(--gemini-border); color: var(--gemini-muted); cursor: not-allowed; }

        .loading {
            display: none;
            color: var(--gemini-accent);
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gemini-border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #5f6368; }
    </style>
</head>
<body>

<div class="top-bar">Agentic RAG Engine</div>

<div class="chat-wrapper" id="chat-wrapper">
    <div class="chat-history" id="chat-history">
        <div class="message bot">
            <div>Hi. I'm your local AI agent. Ask me a technical question about Machine Learning, Deep Learning, or MLOps.</div>
        </div>
        <div class="loading" id="loading">Synthesizing context...</div>
    </div>
</div>

<div class="input-wrapper">
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Enter a prompt here" onkeypress="handleEnter(event)" autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 4L10.59 5.41L16.17 11H4V13H16.17L10.59 18.59L12 20L20 12L12 4Z" fill="currentColor"/>
            </svg>
        </button>
    </div>
</div>

<script>
    const chatWrapper = document.getElementById('chat-wrapper');
    const chatHistory = document.getElementById('chat-history');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const loading = document.getElementById('loading');

    marked.setOptions({
        highlight: function(code, lang) {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language }).value;
        }
    });

    function appendMessage(text, sender, meta = null) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        
        if (sender === 'bot') {
            try {
                const cleanText = text.replace(/^[ \t]+```/gm, '```');
                msgDiv.innerHTML = marked.parse(cleanText);
            } catch (err) {
                console.error("Markdown parsing failed.", err);
                msgDiv.textContent = text; 
            }
        } else {
            msgDiv.textContent = text;
        }
        
        if (meta) {
            const metaDiv = document.createElement('div');
            metaDiv.className = 'meta-tag';
            metaDiv.textContent = `[Routed via: ${meta}]`;
            msgDiv.appendChild(metaDiv);
        }
        
        chatHistory.insertBefore(msgDiv, loading);
        scrollToBottom();
    }

    function scrollToBottom() {
        setTimeout(() => {
            chatWrapper.scrollTop = chatWrapper.scrollHeight;
        }, 50);
    }

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;
        
        loading.style.display = 'block';
        scrollToBottom();

        try {
            const response = await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: text })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                appendMessage(data.reply, 'bot', data.source);
            } else {
                appendMessage(data.error || "A system error occurred.", 'bot');
            }
        } catch (error) {
            appendMessage("Failed to reach the backend server.", 'bot');
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            loading.style.display = 'none';
            userInput.focus();
            scrollToBottom();
        }
    }
</script>

</body>
</html>
